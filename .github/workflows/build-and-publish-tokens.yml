  name: Build and publish design tokens

  permissions:
    contents: write

  on:
    push:
      paths:
        - 'tokens/**'
        - 'style-dictionary.config.mjs'
        - 'scripts/**'
        - 'package.json'
        - 'package-lock.json'
    pull_request:
      paths:
        - 'tokens/**'
        - 'style-dictionary.config.mjs'
        - 'scripts/**'
        - 'package.json'
        - 'package-lock.json'
    workflow_dispatch: {}

  jobs:
    build:
      name: Build tokens and commit generated files
      runs-on: ubuntu-latest

      steps:
        - name: Checkout
          uses: actions/checkout@v5
          with:
            persist-credentials: true
            fetch-depth: 0

        - name: Setup Node.js
          uses: actions/setup-node@v5
          with:
            node-version: '24'

        - name: Install dependencies
          run: npm ci

        - name: Build tokens
          run: npm run build-tokens

        - name: Commit and push generated files
          run: |
            if [ "${{ github.ref_name }}" == "main" ]; then
              echo "Skipping commit/push on main branch (publish job will handle this)"
              exit 0
            fi
            
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            
            echo "---- Git status before commit ----"
            git status --porcelain
            
            git add -A
            git commit -m "chore(tokens): build generated tokens [skip ci]" || echo "No changes to commit"
            
            echo "---- Git status after commit ----"
            git status --porcelain
            
            git push origin HEAD:${{ github.ref_name }} || echo "Push failed (possibly no permission)"

        - name: "Debug: list changed files and dist"
          run: |
            echo "---- Modified tracked files ----"
            git ls-files -m || true
            
            echo "---- Untracked files ----"
            git ls-files --others --exclude-standard || true
            
            echo "---- Git status (porcelain) ----"
            git --no-pager status --porcelain || true
            
            echo "---- Dist directory contents ----"
            if [ -d "dist" ]; then ls -la dist; else echo "dist/ not found"; fi

    publish:
      name: Publish to npm (only on main)
      needs: build
      runs-on: ubuntu-latest
      if: github.ref == 'refs/heads/main'

      steps:
        - name: Checkout
          uses: actions/checkout@v5
          with:
            persist-credentials: true
            fetch-depth: 0

        - name: Setup Node.js
          uses: actions/setup-node@v5
          with:
            node-version: '24'

        - name: Install dependencies
          run: npm ci

        - name: Build tokens (ensure generated files exist)
          run: npm run build-tokens

        - name: Commit generated files if needed
          run: |
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            
            echo "---- Git status before generated files commit ----"
            git status --porcelain
            
            git add -A
            git commit -m "chore(tokens): build generated files [skip ci]" || echo "No changes to commit"
            
            echo "---- Git status after generated files commit ----"
            git status --porcelain

        - name: Verify NPM token (whoami)
          env:
            NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          run: |
            if [ -z "$NODE_AUTH_TOKEN" ]; then
              echo "NPM_TOKEN not set — skipping whoami check"
              exit 0
            fi
            
            echo "//registry.npmjs.org/:_authToken=${NODE_AUTH_TOKEN}" > ~/.npmrc
            echo "Testing npm auth with 'npm whoami'..."
            
            npm whoami || (echo "npm whoami failed; token may be invalid or require 2FA" && exit 1)
            
            rm -f ~/.npmrc

        - name: Check if package version already published
          env:
            NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          run: |
            if [ -z "$NODE_AUTH_TOKEN" ]; then
              echo "Skipping version check — NPM_TOKEN not set"
              exit 0
            fi
            
            echo "Preparing for publish..."

        - name: Bump package version (patch publish)
          env:
            NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          run: |
            if [ -z "$NODE_AUTH_TOKEN" ]; then
              echo "NPM_TOKEN not set — skipping auto-version-bump"
              exit 0
            fi
            
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            
            echo "---- Git status before npm version ----"
            git status --porcelain
            
            OLD_VERSION=$(node -p "require('./package.json').version")
            
            npm version patch -m "chore(release): v%s [skip ci]"
            
            NEW_VERSION=$(node -p "require('./package.json').version")
            
            echo "Version bumped from $OLD_VERSION to $NEW_VERSION"
            echo "Pushing generated files, version commit and tag..."
            
            git push origin HEAD:main
            git push origin --tags

        - name: Publish to npm
          env:
            NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          run: |
            if [ -z "$NODE_AUTH_TOKEN" ]; then
              echo "Skipping publish — NPM_TOKEN not set"
              exit 0
            fi
            
            echo "//registry.npmjs.org/:_authToken=${NODE_AUTH_TOKEN}" > ~/.npmrc
            
            npm publish --access public || (cat ~/.npmrc && exit 1)
            
            rm -f ~/.npmrc

