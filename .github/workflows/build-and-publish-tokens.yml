name: Build and publish design tokens

on:
  push:
    paths:
      - 'tokens/**'
      - 'style-dictionary.config.mjs'
      - 'scripts/**'
      - 'package.json'
  pull_request:
    paths:
      - 'tokens/**'
      - 'style-dictionary.config.mjs'
      - 'scripts/**'
      - 'package.json'
  # Add manual trigger for debugging / manual publish
  workflow_dispatch: {}

jobs:
  build:
    name: Build tokens and commit generated files
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: true
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install dependencies
        run: npm ci

      - name: Build tokens
        # uses the script from your package.json: "build-tokens"
        run: npm run build-tokens

      - name: Commit and push generated files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "chore(tokens): build generated tokens [skip ci]" || echo "No changes to commit"
          # Push back to the current branch
          git push origin HEAD:${{ github.ref_name }} || echo "Push failed (possibly no permission)"

      - name: "Debug: list changed files and dist"
        run: |
          echo "---- Modified tracked files ----"
          git ls-files -m || true
          echo "---- Untracked files ----"
          git ls-files --others --exclude-standard || true
          echo "---- Git status (porcelain) ----"
          git --no-pager status --porcelain || true
          echo "---- Dist directory contents ----"
          if [ -d "dist" ]; then ls -la dist; else echo "dist/ not found"; fi

  publish:
    name: Publish to npm (only on main)
    needs: build
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: true
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install dependencies
        run: npm ci

      - name: Build tokens (ensure dist exists)
        run: npm run build-tokens
      - name: Verify NPM token (whoami)
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          if [ -z "$NODE_AUTH_TOKEN" ]; then
            echo "NPM_TOKEN not set — skipping whoami check"
            exit 0
          fi
          echo "//registry.npmjs.org/:_authToken=${NODE_AUTH_TOKEN}" > ~/.npmrc
          echo "Testing npm auth with 'npm whoami'..."
          npm whoami || (echo "npm whoami failed; token may be invalid or require 2FA" && cat ~/.npmrc && exit 1)
          rm -f ~/.npmrc

      - name: Check if package version already published
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          if [ -z "$NODE_AUTH_TOKEN" ]; then
            echo "NPM_TOKEN not set — cannot check registry; skipping publish check"
            exit 0
          fi
          NAME=$(node -p "require('./package.json').name")
          VERSION=$(node -p "require('./package.json').version")
          echo "Checking npm registry for $NAME@$VERSION"
          echo "//registry.npmjs.org/:_authToken=${NODE_AUTH_TOKEN}" > ~/.npmrc
          if npm view "$NAME@$VERSION" >/dev/null 2>&1; then
            echo "Version $VERSION of $NAME is already published. Skipping publish."
            rm -f ~/.npmrc
            exit 0
          fi
          rm -f ~/.npmrc
          echo "Version $VERSION not found on registry — will attempt publish"

      - name: Publish to npm
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          if [ -z "$NODE_AUTH_TOKEN" ]; then
            echo "Skipping publish — NPM_TOKEN not set"
            exit 0
          fi
          echo "//registry.npmjs.org/:_authToken=${NODE_AUTH_TOKEN}" > ~/.npmrc
          npm publish --access public || (cat ~/.npmrc && exit 1)
          rm -f ~/.npmrc
